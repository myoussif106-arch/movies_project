<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة العرض والمشاهدة السينمائية الاحترافية</title>
    <style>
        body {
            background-color: #0c0c0e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl; 
            text-align: right;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .player-container {
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }
        .back-home-btn {
            background-color: #1c1c24;
            color: white;
            border: 1px solid #333;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
            transition: 0.2s;
            display: inline-block;
            text-decoration: none;
        }
        .back-home-btn:hover { background-color: #e50914; border-color: #e50914; }

        .video-box-3d {
            position: relative;
            width: 100%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            aspect-ratio: 16/9;
        }
        video { width: 100%; height: 100%; object-fit: contain; display: block; }

        .netflix-subtitle-text {
            position: absolute;
            bottom: 65px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0px 0px 7px #000, 0px 0px 4px #000;
            background-color: rgba(0, 0, 0, 0.65);
            padding: 6px 18px;
            border-radius: 6px;
            z-index: 5;
            pointer-events: none;
            text-align: center;
            display: none;
            max-width: 85%;
        }

        .custom-controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        .progress-bar-container {
            width: 100%; height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px; cursor: pointer;
            position: relative;
        }
        .progress-filled { height: 100%; width: 0%; background: #e50914; border-radius: 3px; }
        .controls-row { display: flex; justify-content: space-between; align-items: center; direction: ltr; }
        .left-controls, .right-controls { display: flex; align-items: center; gap: 18px; }
        .control-btn {
            background: none; border: none; color: white;
            font-size: 18px; cursor: pointer; transition: 0.2s;
        }
        .control-btn:hover { color: #e50914; }
        .time-display { font-size: 13px; color: #ccc; font-family: monospace; }

        .movie-title {
            font-size: 24px; font-weight: bold; margin-top: 20px; margin-bottom: 5px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
        }
        .movie-metadata { color: #888; font-size: 14px; margin-bottom: 25px; }

        .episodes-section { margin-top: 25px; background: #141419; padding: 20px; border-radius: 8px; border: 1px solid #222; }
        .episodes-title { font-size: 18px; margin-top: 0; margin-bottom: 15px; color: #e50914; border-right: 4px solid #e50914; padding-right: 8px; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .episode-btn {
            background: #1c1c24; color: white; border: 1px solid #333;
            padding: 12px 5px; border-radius: 6px; cursor: pointer; font-weight: bold;
            text-align: center; transition: 0.2s ease; font-size: 14px;
        }
        .episode-btn:hover { border-color: #e50914; background: #222; }
        .episode-btn.active { background: #e50914; border-color: #e50914; box-shadow: 0 0 12px rgba(229,9,20,0.4); }

        .comments-section { margin-top: 35px; background: #141419; padding: 20px; border-radius: 8px; border: 1px solid #222; }
        .comments-title { font-size: 18px; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; border-right: 4px solid #e50914; padding-right: 8px; }
        .comment-form { display: flex; gap: 12px; margin-bottom: 20px; }
        .comment-input {
            flex: 1; background: #0c0c0e; border: 1px solid #333; border-radius: 6px;
            padding: 12px; color: white; font-size: 14px; outline: none; resize: none; height: 45px; transition: 0.3s;
        }
        .comment-input:focus { border-color: #e50914; }
        .comment-submit-btn {
            background: #e50914; color: white; border: none; padding: 0 22px;
            border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .comment-submit-btn:hover { background: #b80710; }
        .comments-list { display: flex; flex-direction: column; gap: 12px; }
        .comment-item { background: #1c1c24; padding: 14px; border-radius: 6px; border-right: 4px solid #e50914; border-top: 1px solid rgba(255,255,255,0.02); }
        .comment-meta { font-size: 12px; color: #888; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .comment-author { font-weight: bold; color: #fff; }
        .comment-text { font-size: 14px; line-height: 1.5; color: #ccc; }

        @media (max-width: 768px) {
            .player-container { padding: 10px; }
            .back-home-btn { width: 100%; text-align: center; box-sizing: border-box; }
            .movie-title { font-size: 19px; flex-direction: column; align-items: flex-start; gap: 12px; }
            .movie-title div { width: 100%; display: flex; gap: 10px; }
            .movie-title button { flex: 1; justify-content: center; padding: 8px; font-size: 14px; }
            .netflix-subtitle-text { font-size: 17px !important; padding: 6px 12px; width: 90%; bottom: 55px; }
            .progress-bar-container { height: 6px; }
            .control-btn { font-size: 20px; }
            .episodes-grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; }
            .episode-btn { padding: 10px 2px; font-size: 12px; }
            .comment-form { flex-direction: column; }
            .comment-submit-btn { padding: 12px; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="player-container">
        <a href="home.html" class="back-home-btn">⬅ العودة للقائمة الرئيسية</a>

        <div class="video-box-3d" id="video-box">
            <video id="main-player" playsinline></video>
            <div class="netflix-subtitle-text" id="subtitle-box"></div>

            <div class="custom-controls" id="video-controls">
                <div class="progress-bar-container" id="progress-container">
                    <div class="progress-filled" id="progress-bar"></div>
                </div>
                <div class="controls-row">
                    <div class="left-controls">
                        <button class="control-btn" id="play-btn">▶</button>
                        <button class="control-btn" id="mute-btn">🔊</button>
                        <span class="time-display" id="time-display">00:00 / 00:00</span>
                    </div>
                    <div class="right-controls">
                        <button class="control-btn" id="fullscreen-btn">🔲</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="movie-title">
            <span id="movie-title-text">اسم المسلسل</span>
            <div style="direction: ltr;">
                <button onclick="handleEpisodeInteraction('like')" style="background: #1c1c24; border: 1px solid #333; color: #22c55e; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 6px;">
                    👍 <span id="ep-like-count">0</span>
                </button>
                <button onclick="handleEpisodeInteraction('dislike')" style="background: #1c1c24; border: 1px solid #333; color: #ef4444; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 6px;">
                    👎 <span id="ep-dislike-count">0</span>
                </button>
            </div>
        </div>
        <div class="movie-metadata" id="movie-genre-text">الصنف والنوع</div>

        <div class="episodes-section">
            <h4 class="episodes-title">حلقات العرض</h4>
            <div class="episodes-grid" id="episodes-container"></div>
        </div>

        <div class="comments-section">
            <h4 class="comments-title">مراجعات الجمهور والتعليقات 💬</h4>
            <div class="comment-form">
                <textarea class="comment-input" id="comment-field" placeholder="اكتب مراجعتك أو رأيك عن الحلقة هنا..."></textarea>
                <button class="comment-submit-btn" onclick="submitComment()">نشر</button>
            </div>
            <div class="comments-list" id="comments-box"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="movies.js"></script>
    <script>
        const SUPABASE_URL = "https://wdyhgweypfquorviikxx.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndkeWhnd2V5cGZxdW9ydmlpa3h4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjQ2MDksImV4cCI6MjA5NjUwMDYwOX0.zNEqFeVZmTJynohdkP6cQKH-NWUgpsAQQ8gGlHaYoDs";
        
        let _supabase;
        try { _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) { console.error(e); }

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        const movieData = JSON.parse(localStorage.getItem('selectedMovie'));

        const player = document.getElementById('main-player');
        const playBtn = document.getElementById('play-btn');
        const muteBtn = document.getElementById('mute-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const timeDisplay = document.getElementById('time-display');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const videoBox = document.getElementById('video-box');
        const controls = document.getElementById('video-controls');
        const subtitleBox = document.getElementById('subtitle-box');

        let currentMovieId = movieData ? movieData.id : "";
        let currentEpisodeName = "";
        let introStart = 0, introEnd = 0;
        let lastSavedTime = 0;

        if (!currentUser) { window.location.href = "index.html"; }

        if (movieData) {
            document.getElementById('movie-title-text').innerText = movieData.title;
            document.getElementById('movie-genre-text').innerText = `${movieData.genre} • ⭐ ${movieData.rating}`;
            
            const epContainer = document.getElementById('episodes-container');
            movieData.episodes.forEach((ep, idx) => {
                const btn = document.createElement('button');
                btn.className = `episode-btn ${idx === 0 ? 'active' : ''}`;
                btn.id = `ep-btn-${idx}`;
                btn.innerText = ep.name;
                btn.onclick = () => playEpisode(ep, btn);
                epContainer.appendChild(btn);
            });

            if (movieData.episodes.length > 0) {
                playEpisode(movieData.episodes[0], epContainer.firstChild);
            }
        }

        async function playEpisode(ep, btnElement) {
            currentEpisodeName = ep.name;
            introStart = ep.introStart || 0;
            introEnd = ep.introEnd || 0;
            
            player.src = ep.video;
            player.load();
            
            document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');

            if (_supabase && currentUser) {
                const { data } = await _supabase.from('user_progress').select('progress_seconds').eq('user_email', currentUser.email).eq('movie_id', currentMovieId).maybeSingle();
                if (data && data.progress_seconds > 3) {
                    const confirmResume = confirm(`هل تود استكمال المشاهدة من الدقيقة ${formatTime(data.progress_seconds)}؟`);
                    if (confirmResume) player.currentTime = data.progress_seconds;
                }
            }
            player.play().then(() => playBtn.innerText = "⏸").catch(() => playBtn.innerText = "▶");
            loadComments();
            fetchEpisodeInteractions();
        }

        player.ontimeupdate = () => {
            const currentTime = player.currentTime;
            const duration = player.duration || 0;
            
            const pct = (currentTime / duration) * 100;
            progressBar.style.width = `${pct}%`;
            timeDisplay.innerText = `${formatTime(currentTime)} / ${formatTime(duration)}`;

            if (currentTime >= introStart && currentTime <= introEnd) {
                subtitleBox.innerText = "تخطي المقدمة ⏭";
                subtitleBox.style.display = 'block';
                subtitleBox.style.cursor = 'pointer';
                subtitleBox.onclick = () => { player.currentTime = introEnd; subtitleBox.style.display = 'none'; };
            } else {
                subtitleBox.style.display = 'none';
                subtitleBox.onclick = null;
            }

            if (Math.abs(currentTime - lastSavedTime) > 7) {
                saveProgress(currentTime);
                lastSavedTime = currentTime;
            }
        };

        async function saveProgress(time) {
            if (!_supabase || !currentUser) return;
            await _supabase.from('user_progress').upsert({
                user_email: currentUser.email, movie_id: currentMovieId,
                episode_name: currentEpisodeName, progress_seconds: time, updated_at: new Date()
            }, { onConflict: 'user_email,movie_id' });
        }

        playBtn.onclick = () => {
            if (player.paused) { player.play(); playBtn.innerText = "⏸"; } 
            else { player.pause(); playBtn.innerText = "▶"; saveProgress(player.currentTime); }
        };

        muteBtn.onclick = () => {
            player.muted = !player.muted;
            muteBtn.innerText = player.muted ? "🔇" : "🔊";
        };

        progressContainer.onclick = (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            player.currentTime = pos * player.duration;
        };

        fullscreenBtn.onclick = () => {
            if (!document.fullscreenElement) { videoBox.requestFullscreen().catch(err => console.log(err)); } 
            else { document.exitFullscreen(); }
        };

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            const min = Math.floor(seconds / 60).toString().padStart(2, '0');
            const sec = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${min}:${sec}`;
        }

        let timeout;
        videoBox.onmousemove = () => {
            controls.style.opacity = '1';
            clearTimeout(timeout);
            timeout = setTimeout(() => { if (!player.paused) controls.style.opacity = '0'; }, 2500);
        };

        async function loadComments() {
            if (!_supabase) return;
            const box = document.getElementById('comments-box');
            box.innerHTML = "جاري تحميل المراجعات...";

            const { data, error } = await _supabase.from('comments')
                .select('*')
                .eq('movie_id', currentMovieId)
                .eq('episode_name', currentEpisodeName)
                .order('created_at', { ascending: false });

            if (error) { box.innerHTML = "خطأ أثناء تحميل التعليقات."; return; }
            if (!data || data.length === 0) { box.innerHTML = "لا توجد تعليقات أو مراجعات لهذه الحلقة بعد. كن أول من يكتب!"; return; }

            box.innerHTML = '';
            data.forEach(c => {
                const item = document.createElement('div');
                item.className = 'comment-item';
                item.innerHTML = `
                    <div class="comment-meta">
                        <span class="comment-author">🕵️‍♂️ ${c.username}</span>
                        <span>${new Date(c.created_at).toLocaleDateString('ar-EG')}</span>
                    </div>
                    <div class="comment-text">${c.comment_text}</div>
                `;
                box.appendChild(item);
            });
        }

        async function submitComment() {
            const field = document.getElementById('comment-field');
            const text = field.value.trim();
            if (!text || !_supabase || !currentUser) return;

            const { error } = await _supabase.from('comments').insert([{
                user_email: currentUser.email,
                username: currentUser.username || "youssef",
                movie_id: currentMovieId,
                episode_name: currentEpisodeName,
                comment_text: text
            }]);

            if (!error) { field.value = ''; loadComments(); } 
            else { alert("حدث خطأ أثناء إرسال التعليق."); }
        }

        async function fetchEpisodeInteractions() {
            if (!_supabase || !currentMovieId || !currentEpisodeName) return;
            const { data: likes } = await _supabase.from('episode_interactions').select('id').eq('movie_id', currentMovieId).eq('episode_name', currentEpisodeName).eq('type', 'like');
            const { data: dislikes } = await _supabase.from('episode_interactions').select('id').eq('movie_id', currentMovieId).eq('episode_name', currentEpisodeName).eq('type', 'dislike');
            document.getElementById('ep-like-count').innerText = likes ? likes.length : 0;
            document.getElementById('ep-dislike-count').innerText = dislikes ? dislikes.length : 0;
        }

        async function handleEpisodeInteraction(type) {
            if (!currentUser || !_supabase || !currentMovieId || !currentEpisodeName) return;
            const { error } = await _supabase.from('episode_interactions').upsert({
                user_email: currentUser.email, movie_id: currentMovieId,
                episode_name: currentEpisodeName, type: type
            }, { onConflict: 'user_email,movie_id,episode_name' });
            if (!error) fetchEpisodeInteractions();
        }
    </script>
</body>
</html>
