تشين شياو مان، مبتدئة

166
00:11:14.160 --> 00:11:15.600
تخرجت من أكاديمية هوا دونغ للشرطة

167
00:11:15.600 --> 00:11:17.160
اليوم هو يومها الأول هنا

168
00:11:17.160 --> 00:11:18.840
علاقتها بوالديها ليست وثيقة

169
00:11:18.840 --> 00:11:20.240
ونشأت مع خالتها

170
00:11:20.280 --> 00:11:21.440
خالتها تحبها كثيرًا

171
00:11:21.440 --> 00:11:22.440
...إنها

172
00:11:22.440 --> 00:11:23.360
مرحة

173
00:11:23.400 --> 00:11:24.310
وحريصة على التفاخر بنفسها

174
00:11:28.400 --> 00:11:29.720
كيف عرف؟

175
00:11:30.720 --> 00:11:31.400
سيدي،

176
00:11:31.560 --> 00:11:33.200
ما هي القضية التالية؟

177
00:11:33.720 --> 00:11:34.320
لا شيء

178
00:11:34.320 --> 00:11:35.320
جميعها حالات بسيطة -
لا بأس -

179
00:11:35.320 --> 00:11:36.040
اتركها لي

180
00:11:36.160 --> 00:11:37.160
سوف أجد ذلك بنفسي

181
00:11:45.800 --> 00:11:47.360
هربت زوجة من المنزل

182
00:11:47.360 --> 00:11:48.840
قدم زوجها تقرير للشرطة للعثور عليها

183
00:11:48.880 --> 00:11:51.560
لا أخبار حتى الآن وقد تكون ميتة

184
00:11:51.760 --> 00:11:53.480
لقد اختفت لعدة أيام

185
00:11:55.440 --> 00:11:56.520
ممتعة

186
00:11:59.000 --> 00:12:00.200
ما الذي يجعلها ممتعة؟

187
00:12:00.720 --> 00:12:02.000
قال الرجل آخر مرة

188
00:12:02.000 --> 00:12:03.360
أنه رأى زوجته

189
00:12:03.360 --> 00:12:04.440
ترتدي فستان حريري

190
00:12:04.440 --> 00:12:06.040
بزهور صفراء وتطريز خفيف

191
00:12:06.040 --> 00:12:07.520
،زوج من الكعب الذهبي

192
00:12:07.520 --> 00:12:08.720
وترتدي زوج من أقراط اللؤلؤ

193
00:12:08.840 --> 00:12:10.680
وترتدي سوارًا من اليشم الأخضر على معصمها الأيمن

194
00:12:10.680 --> 00:12:12.840
وعلى أظافرها طلاء أظافر أحمر

195
00:12:13.480 --> 00:12:14.760
هل هناك شيء خاطئ؟

196
00:12:16.800 --> 00:12:18.240
لقد انتقلتِ إلى الشقة أمس

197
00:12:18.240 --> 00:12:19.480
هل تذكرين

198
00:12:19.480 --> 00:12:20.760
ما الذي كانت ترتديه المالكة؟

199
00:12:28.920 --> 00:12:30.320
فستان حريري بنفسجي به فتحة من الصدر

200
00:12:30.400 --> 00:12:32.400
والكعب بنفسجي مصنوع من الاستنسل

201
00:12:32.400 --> 00:12:34.360
كانت ترتدي خاتم من اللؤلؤ

202
00:12:34.360 --> 00:12:35.680
هل وضعت أي طلاء أظافر؟

203
00:12:35.760 --> 00:12:36.440
نعم

204
00:12:36.760 --> 00:12:37.520
لون بني

205
00:12:39.080 --> 00:12:39.800
أنتِ مُخطئة

206
00:12:39.880 --> 00:12:41.760
بل وضعت طلاء أظافر بلون النبيذ

207
00:12:45.360 --> 00:12:46.320
أنتِ

208
00:12:46.320 --> 00:12:47.480
شُرطية مُحترفة

209
00:12:47.480 --> 00:12:49.120
لم تتذكري حتى السيدة التي قابلتها بالأمس

210
00:12:49.120 --> 00:12:50.280
زوجة الرجل

211
00:12:50.280 --> 00:12:51.320
في عداد المفقودين لعدة أيام

212
00:12:51.320 --> 00:12:53.040
لكنه يستطيع أن يتذكرها بالتفصيل

213
00:12:53.040 --> 00:12:53.400
،وبالتالي

214
00:12:53.680 --> 00:12:54.920
قد يكون عبقريًا

215
00:12:54.920 --> 00:12:55.520
أو

216
00:12:55.800 --> 00:12:56.760
أنه يكذب

217
00:13:00.840 --> 00:13:02.040
لو فاي، إلى أين أنت ذاهب؟

218
00:13:03.160 --> 00:13:04.040
للتحقيق

219
00:13:04.120 --> 00:13:05.960
،أنت تحتاج فقط مساعدة من شرطة المباحث في التحقيق

220
00:13:06.320 --> 00:13:08.240
لا تحقق بمفردك، مفهوم؟

221
00:13:08.240 --> 00:13:09.400
،أنت تعني

222
00:13:09.720 --> 00:13:11.240
بأني أحتاج إلى مخبر شرطة؟

223
00:13:11.960 --> 00:13:13.400
حسنًا، سأختار بنفسي

224
00:13:13.600 --> 00:13:14.320
!أيتها المبتدئة

225
00:13:15.720 --> 00:13:16.440
تعالي

226
00:13:18.400 --> 00:13:19.080
ماذا تريد؟

227
00:13:19.440 --> 00:13:20.280
لديكِ قضية الآن

228
00:13:20.640 --> 00:13:21.320
تعال معي

229
00:13:25.520 --> 00:13:26.360
انتظر

230
00:13:57.040 --> 00:13:57.920
أيوجد أحد بالمنزل؟

231
00:14:00.000 --> 00:14:01.240
!اذهبي

232
00:14:01.240 --> 00:14:02.160
لقد قلت لكِ عدة مرات

233
00:14:02.160 --> 00:14:03.640
سيدي ليس موجود

234
00:14:03.640 --> 00:14:04.320
،وإذا طرقتِ الباب مُجددًا

235
00:14:04.320 --> 00:14:05.840
سأتصل بالشرطة

236
00:14:05.960 --> 00:14:06.640
!أيها العم

237
00:14:07.200 --> 00:14:08.560
نحن من مركز الشرطة

238
00:14:15.320 --> 00:14:15.880
من هذا الاتجاه من فضلك

239
00:14:39.760 --> 00:14:40.440
لو فاي

240
00:14:53.280 --> 00:14:54.040
تفضل بالدخول

241
00:14:59.120 --> 00:15:00.120
سوف أٌخبر سيدي

242
00:15:00.200 --> 00:15:00.920
حسنًا

243
00:15:05.520 --> 00:15:06.440
إنهم أكثر ثراءً

244
00:15:06.440 --> 00:15:08.600
من سو سو

245
00:15:10.240 --> 00:15:11.360
اعتادوا أن يكونوا أغنياء

246
00:15:12.640 --> 00:15:13.800
معظم الرمال الرمادية

247
00:15:13.800 --> 00:15:15.760
على الطريق خشنة

248
00:15:15.760 --> 00:15:17.160
لكنهم مُضافون حديثًا

249
00:15:17.160 --> 00:15:18.600
بعضًا من الرمال الرمادية الرخيصة

250
00:15:18.600 --> 00:15:19.440
نحن ضيوف

251
00:15:19.440 --> 00:15:20.520
لكنهم لم يقدموا لنا المشروبات

252
00:15:20.520 --> 00:15:21.400
،على ما يبدو

253
00:15:21.400 --> 00:15:22.240
ليس لديهم خدم آخرون

254
00:15:22.240 --> 00:15:23.280
بجانب الرجل العجوز

255
00:15:23.600 --> 00:15:25.120
اعتقد أنهم لا يستطيعون تحملهم

256
00:15:25.120 --> 00:15:26.040
وأنهوا خدمة جميع الخدم

257
00:15:26.320 --> 00:15:27.360
القي نظرة على الرف العتيق

258
00:15:27.720 --> 00:15:29.640
يجب أن تكون الرفوف متباعدة بشكل جيد

259
00:15:29.920 --> 00:15:31.040
انظري إلى المزهريات

260
00:15:31.200 --> 00:15:33.360
تكرر كل نمط ولون وصورة

261
00:15:33.680 --> 00:15:34.760
من الواضح، هذه

262
00:15:34.760 --> 00:15:36.280
كل ما لدى المالك

263
00:15:36.280 --> 00:15:37.360
أبعدوا جميع المزهريات

264
00:15:37.520 --> 00:15:38.640
من الواجهة

265
00:15:39.320 --> 00:15:41.800
حتى أنهم لم يغيروا المزهرية المكسورة

266
00:15:46.560 --> 00:15:47.360
مرحبًا

267
00:15:53.560 --> 00:15:54.680
بو يان مريض

268
00:15:55.200 --> 00:15:56.920
تستطيع التحدث معي

269
00:15:57.560 --> 00:15:58.720
أنا والدته

270
00:15:58.960 --> 00:16:00.160
هل هو مريض حقًا؟

271
00:16:01.440 --> 00:16:02.760
نعم

272
00:16:02.880 --> 00:16:05.000
،منذ أن هربت مينغ جو بعيدًا عن المنزل

273
00:16:05.040 --> 00:16:06.680
فقد رغبته في الطعام والشراب

274
00:16:06.680 --> 00:16:08.320
ويبتعد عن الأنظار دائمًا

275
00:16:10.200 --> 00:16:11.520
فقد رغبته في الطعام والشراب

276
00:16:12.840 --> 00:16:14.800
ولكن فقط يأكل اللحم البقري من مطعم ريتشارد؟

277
00:16:16.000 --> 00:16:17.320
هذا طلبي

278
00:16:17.440 --> 00:16:18.160
أمي

279
00:16:18.840 --> 00:16:19.640
من هذا؟

280
00:16:20.280 --> 00:16:22.080
خدمة التوصيل من تساي تشي تشاي؟

281
00:16:28.640 --> 00:16:29.760
...إنهم

282
00:16:32.680 --> 00:16:34.040
إنهم من مركز الشرطة

283
00:16:35.400 --> 00:16:36.680
مركز الشرطة؟

284
00:16:39.240 --> 00:16:41.760
التقيت المحقق يي من قبل

285
00:16:44.800 --> 00:16:45.800
لقد أغلقت القضية

286
00:16:46.080 --> 00:16:47.760
لا تقلق

287
00:16:53.880 --> 00:16:54.840
،السيد ما

288
00:16:55.400 --> 00:16:58.160
هل المحقق يي وجد زوجتك؟

289
00:16:59.160 --> 00:17:00.480
ليس بعد

290
00:17:00.920 --> 00:17:02.880
كيف يمكنك اغلاق القضية ذًا؟

291
00:17:03.320 --> 00:17:04.280
ألا تريد

292
00:17:04.880 --> 00:17:06.400
أن تجد زوجتك؟

293
00:17:07.070 --> 00:17:08.230
كلا

294
00:17:09.160 --> 00:17:10.640
أقدر لكِ مساعدتك

295
00:17:10.960 --> 00:17:11.920
لقد مضى وقت طويل

296
00:17:11.920 --> 00:17:13.960
ولم نسمع منكم أي خبر

297
00:17:14.240 --> 00:17:15.880
ظننا أنكم لا تستطيعون العثور عليها

298
00:17:15.880 --> 00:17:17.400
وفقدنا كل الأمل

299
00:17:18.960 --> 00:17:21.000
كيف هي علاقتك بزوجتك؟

300
00:17:21.440 --> 00:17:22.120
..حسنًا

301
00:17:22.280 --> 00:17:24.560
إنهم شباب

302
00:17:24.960 --> 00:17:26.440
والمشاجرة بينهما مُجرد

303
00:17:26.680 --> 00:17:28.400
شيء صغير بالنسبة لهما

304
00:17:28.440 --> 00:17:29.640
صحبح؟

305
00:17:29.960 --> 00:17:31.920
هل شجارهم كان في اليوم

306
00:17:32.680 --> 00:17:34.320
الذي هربت به من المنزل؟

307
00:17:34.640 --> 00:17:36.360
لقد كانت غير عقلانية دائمًا

308
00:17:37.240 --> 00:17:39.400
كانت دائمًا تريد العودة إلى والديها

309
00:17:41.400 --> 00:17:42.880
،بعد أن اختفت رو مينغ جو

310
00:17:43.320 --> 00:17:45.680
أنتما انتظرتما في المنزل، أليس كذلك؟

311
00:17:46.280 --> 00:17:47.040
نعم

312
00:17:47.760 --> 00:17:49.040
،قبل ثلاثة أيام

313
00:17:49.120 --> 00:17:50.520
ذهبت للصلاة لوالدي

314
00:17:54.000 --> 00:17:56.240
نأمل أن يتمكن من مساعدتنا

315
00:17:56.600 --> 00:17:58.840
للعثور على مينغ جو في أقرب وقت ممكن

316
00:17:59.200 --> 00:18:00.640
هذا صحيح

317
00:18:01.320 --> 00:18:02.120
،السيدة ما

318
00:18:02.120 --> 00:18:03.800
نود التحدث إلى السيد ما شخصيًا

319
00:18:04.120 --> 00:18:05.040
هل يمكنك فعل ذلك من فضلك

320
00:18:05.720 --> 00:18:06.440
اتركينا قليلاً، حسنًا؟

321
00:18:11.520 --> 00:18:12.320
بالطبع بكل تأكيد

322
00:18:15.280 --> 00:18:16.080
بو يان

323
00:18:16.800 --> 00:18:20.200
إنهم هنا لمساعدتك في البحث عن مينغ جو

324
00:18:20.280 --> 00:18:22.360
تحدث معهم بلطف

325
00:18:30.080 --> 00:18:31.600
،لقد قلت أن زوجتك تركت رسالة

326
00:18:31.640 --> 00:18:32.440
أين هي الرسالة؟

327
00:18:34.720 --> 00:18:36.440
إنها في غرفتي في الطابق العلوي

328
00:18:36.520 --> 00:18:37.440
سأذهب وأحضرها لك

329
00:18:43.400 --> 00:18:44.680
من فضلكم انتظروا

330
00:18:45.280 --> 00:18:46.520
سأذهب وأحضرها

331
00:18:46.840 --> 00:18:47.720
لا بأس

332
00:18:47.720 --> 00:18:48.840
سوف نذهب معك

333
00:18:49.840 --> 00:18:50.560
رجاءً

334
00:18:55.720 --> 00:18:56.480
السيد وو

335
00:18:57.040 --> 00:18:58.120
تعال إلينا بسرعة

336
00:18:58.720 --> 00:18:59.720
اسمحوا لي أن أبحث عنها

337
00:19:21.960 --> 00:19:22.960
رهان الأمس

338
00:19:24.160 --> 00:19:25.560
يبدو أن فقدان زوجتك

339
00:19:25.920 --> 00:19:27.360
لا يؤثر أبدًا على مزاجك

340
00:19:30.960 --> 00:19:33.240
اصطحبني أصدقائي إلى هناك

341
00:19:33.280 --> 00:19:35.080
أرادوا مواساتي ولم أستطع رفض ذلك

342
00:19:37.280 --> 00:19:39.000
رأيت للتو أحذيتك الخاصة بالرقص

343
00:19:39.000 --> 00:19:39.960
مصقولة

344
00:19:40.280 --> 00:19:41.840
هل سترقص الليلة؟

345
00:19:42.800 --> 00:19:43.720
إنها عادتي

346
00:19:44.200 --> 00:19:46.000
جلد الغنم سيتسخ بسهولة إذا لم يُصقل

347
00:19:48.680 --> 00:19:50.840
ماذا عن باراماونت؟ عادة أيضًا؟

348
00:19:54.040 --> 00:19:55.000
لقد وجدت الرسالة

349
00:19:59.800 --> 00:20:00.600
"بو يان"

350
00:20:00.960 --> 00:20:01.840
"سأغادر"

351
00:20:02.840 --> 00:20:04.480
"أمك فظة وغير عقلانية"

352
00:20:04.680 --> 00:20:06.960
"أنت مستهتر مع عائلتنا"

353
00:20:07.240 --> 00:20:08.960
"اليوم، جعلتني أفهم كل شيء"

354
00:20:09.000 --> 00:20:10.560
"أنا لست على استعداد للتحمل"

355
00:20:10.800 --> 00:20:12.640
"سأبحث عن حياتي الجديدة"

356
00:20:12.760 --> 00:20:14.960
"وأكون سيدة عصرية لها حياة ذات معنى"

357
00:20:15.280 --> 00:20:16.400
هذا كل شئ

358
00:20:16.760 --> 00:20:17.840
رون مينغ جو

359
00:20:20.440 --> 00:20:21.160
غريب

360
00:20:21.880 --> 00:20:22.840
خطاب مزيف؟

361
00:20:22.840 --> 00:20:23.800
،الرسالة حقيقية

362
00:20:24.240 --> 00:20:25.400
لكن ليس الوقت

363
00:20:25.680 --> 00:20:27.040
هذه الرسالة للسيدة ما

364
00:20:27.040 --> 00:20:29.200
عندما هربت من المنزل قبل عام

365
00:20:30.040 --> 00:20:31.240
إنها

366
00:20:31.240 --> 00:20:31.760
دائمًا

367
00:20:31.760 --> 00:20:33.720
أرادت أن تهرب من المنزل

368
00:20:33.920 --> 00:20:35.920
ولكن ما الذي يجعلك تقول أنها رسالة قبل عام؟

369
00:20:36.440 --> 00:20:37.560
الورقة

370
00:20:37.960 --> 00:20:39.480
وتغيير الحبر

371
00:20:39.720 --> 00:20:40.400
وأيضًا

372
00:20:41.040 --> 00:20:42.600
كلمات "السيدة العصرية"

373
00:20:43.200 --> 00:20:44.880
قبل عام، إنهُ فيلم

374
00:20:44.880 --> 00:20:45.920
اسمه "سيدة عصرية"

375
00:20:45.960 --> 00:20:48.360
إنها حول كيفية كسر المرأة قفص العائلة الإقطاعية

376
00:20:48.360 --> 00:20:49.760
وعيش حياتها الخاصة

377
00:20:50.320 --> 00:20:51.560
،لقد ذكرت

378
00:20:51.560 --> 00:20:53.240
"اليوم، جعلتني أفهم كل شيء"

379
00:20:53.600 --> 00:20:54.360
إنها تتحدث عن

380
00:20:54.520 --> 00:20:56.240
البطلة في الفيلم

381
00:20:56.240 --> 00:20:57.040
،وبالتالي

382
00:20:57.280 --> 00:20:59.200
الرسالة كتبت قبل عام

383
00:20:59.320 --> 00:21:00.400
لكنك أخبرتنا أنه مكتوب

384
00:21:00.400 --> 00:21:02.120
من قِبل زوجتك قبل أن تختفي

385
00:21:02.680 --> 00:21:03.480
ما هو دافعك؟

386
00:21:04.640 --> 00:21:06.000
..أنا -
سيد ما -

387
00:21:06.520 --> 00:21:08.000
تقديم أدلة وهمية للشرطة

388
00:21:08.400 --> 00:21:09.440
يمكن أن يكون جريمة

389
00:21:11.040 --> 00:21:12.840
تم العثور على الرسالة من قِبل والدتي

390
00:21:12.840 --> 00:21:14.600
يجب أن تسأليها

391
00:21:14.920 --> 00:21:16.360

        let parsedSubtitles = [];

        function parseVTT(vttText) {
            parsedSubtitles = [];
            const regex = /(\d{2}:\d{2}:\d{2}\.\d{3}) --> (\d{2}:\d{2}:\d{2}\.\d{3})\r?\n([\s\S]*?)(?=\r?\n\r?\n|\r?\n*$)/g;
            let match;
            while ((match = regex.exec(vttText)) !== null) {
                parsedSubtitles.push({
                    start: toSeconds(match[1]),
                    end: toSeconds(match[2]),
                    text: match[3].replace(/\r?\n/g, '<br>')
                });
            }
        }

        function toSeconds(timeStr) {
            const p = timeStr.split(':');
            return parseInt(p[0]) * 3600 + parseInt(p[1]) * 60 + parseFloat(p[2]);
        }

        // 🚀 لقط الـ id المقروء والربط الفعلي
        if (typeof movies !== 'undefined' && movies.length > 0) {
            const urlParams = new URLSearchParams(window.location.search);
            const movieIndex = parseInt(urlParams.get('id')) || 0; 
            const movie = movies[movieIndex];
            
            if (movie) {
                document.getElementById('movie-title').innerText = movie.title;
                document.getElementById('movie-meta').innerText = `${movie.genre} | ⭐ ${movie.rating}`;

                const grid = document.getElementById('episodes-grid');
                grid.innerHTML = ''; 
                
                movie.episodes.forEach((ep, index) => {
                    const btn = document.createElement('button');
                    btn.className = `episode-btn ${index === 0 ? 'active' : ''}`;
                    btn.innerText = ep.name;
                    btn.onclick = () => playEpisode(ep, btn);
                    grid.appendChild(btn);
                });

                if(movie.episodes.length > 0) {
                    playEpisode(movie.episodes[0], grid.children[0]);
                }
            }
        } else {
            document.getElementById('movie-title').innerText = "خطأ في ملف movies.js!";
        }

        function playEpisode(episode, btnElement) {
            const episodeSubtitle = subtitlesData[episode.name] || "WEBVTT\n";
            parseVTT(episodeSubtitle);

            const videoBox = document.getElementById('video-box');
            videoBox.innerHTML = `
                <video id="main-player" style="width: 100%; height: 100%; object-fit: contain;">
                    <source src="${episode.video}" type="video/mp4">
                </video>
                <div class="netflix-subtitle-overlay">
                    <span id="netflix-sub-box" class="netflix-subtitle-text" style="display:none;"></span>
                </div>
                <div class="custom-controls" id="custom-controls">
                    <div class="progress-bar-container" id="progress-container">
                        <div class="progress-filled" id="progress-filled"></div>
                    </div>
                    <div class="controls-row">
                        <div class="controls-left-side">
                            <button class="control-btn" id="play-btn">▶</button>
                            <button class="control-btn" id="mute-btn">🔊</button>
                            <span class="time-display" id="time-display">00:00 / 00:00</span>
                        </div>
                        <div class="controls-right-side">
                            <button class="control-btn" id="fullscreen-btn">📺 شاشة كاملة</button>
                        </div>
                    </div>
                </div>
            `;

            const player = document.getElementById('main-player');
            const subBox = document.getElementById('netflix-sub-box');
            const playBtn = document.getElementById('play-btn');
            const muteBtn = document.getElementById('mute-btn');
            const fullscreenBtn = document.getElementById('fullscreen-btn');
            const progressContainer = document.getElementById('progress-container');
            const progressFilled = document.getElementById('progress-filled');
            const timeDisplay = document.getElementById('time-display');
            const controls = document.getElementById('custom-controls');

            playBtn.onclick = () => {
                if (player.paused) { player.play(); playBtn.innerText = "⏸"; } 
                else { player.pause(); playBtn.innerText = "▶"; }
            };
            player.onclick = () => playBtn.click();

            muteBtn.onclick = () => {
                player.muted = !player.muted;
                muteBtn.innerText = player.muted ? "🔇" : "🔊";
            };

            player.addEventListener('timeupdate', () => {
                const currentTime = player.currentTime;
                const activeSub = parsedSubtitles.find(sub => currentTime >= sub.start && currentTime <= sub.end);
                if (activeSub) {
                    subBox.innerHTML = activeSub.text;
                    subBox.style.display = "inline-block";
                } else {
                    subBox.style.display = "none";
                }

                const percentage = (player.currentTime / player.duration) * 100;
                progressFilled.style.width = `${percentage}%`;
                timeDisplay.innerText = `${formatTime(player.currentTime)} / ${formatTime(player.duration || 0)}`;
            });

            progressContainer.onclick = (e) => {
                const rect = progressContainer.getBoundingClientRect();
                const pos = (e.clientX - rect.left) / rect.width;
                player.currentTime = pos * player.duration;
            };

            fullscreenBtn.onclick = () => {
                if (!document.fullscreenElement) { videoBox.requestFullscreen().catch(err => console.log(err)); } 
                else { document.exitFullscreen(); }
            };

            document.onkeydown = (e) => {
                if (e.key === "ArrowRight") { e.preventDefault(); player.currentTime = Math.min(player.duration, player.currentTime + 5); }
                if (e.key === "ArrowLeft") { e.preventDefault(); player.currentTime = Math.max(0, player.currentTime - 5); }
                if (e.key === " " || e.key === "Spacebar") { e.preventDefault(); playBtn.click(); }
            };

            function formatTime(seconds) {
                const min = Math.floor(seconds / 60).toString().padStart(2, '0');
                const sec = Math.floor(seconds % 60).toString().padStart(2, '0');
                return `${min}:${sec}`;
            }

            let timeout;
            videoBox.onmousemove = () => {
                controls.style.opacity = '1';
                clearTimeout(timeout);
                timeout = setTimeout(() => { if (!player.paused) controls.style.opacity = '0'; }, 2500);
            };

            document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
        }
    </script>
